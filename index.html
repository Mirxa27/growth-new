<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <title>Newomen - AI-Powered Personal Growth Platform</title>
    <meta name="description" content="Transform your story with NewMe, your emotionally intelligent AI companion for narrative identity exploration and personal growth" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="theme-color" content="#d946ef" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Newomen" />
    
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="/symbol.svg" as="image" type="image/svg+xml">
    
    <!-- Error handling for unsupported browsers and extension conflicts -->
    <script>
      // Check for basic ES6 support
      try {
        eval('const test = () => {};');
      } catch (e) {
        document.write('<div style="text-align:center;padding:50px;font-family:system-ui;"><h1>Browser Not Supported</h1><p>Please use a modern browser like Chrome, Firefox, Safari, or Edge.</p></div>');
      }

      // Protect against browser extension conflicts
      window.addEventListener('error', function(event) {
        // Ignore errors from browser extensions
        if (event.filename && (
          event.filename.includes('extension://') ||
          event.filename.includes('chrome-extension://') ||
          event.filename.includes('moz-extension://') ||
          event.filename.includes('safari-extension://')
        )) {
          event.preventDefault();
          event.stopPropagation();
          return false;
        }
      });

      // Protect against extension script injection
      const originalAppend = Document.prototype.appendChild;
      Document.prototype.appendChild = function(child) {
        // Block suspicious script injections
        if (child.tagName === 'SCRIPT' && child.src && (
          child.src.includes('extension://') ||
          child.src.includes('chrome-extension://') ||
          child.src.includes('moz-extension://')
        )) {
          console.warn('Blocked extension script injection:', child.src);
          return child;
        }
        return originalAppend.call(this, child);
      };
    </script>
    <script src="/extension-protection.js"></script>
  </head>
  <body>
    <div id="root">
      <!-- Loading fallback -->
      <div id="initial-loading" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1a1a1a, #2d1b69);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        font-family: system-ui, -apple-system, sans-serif;
        z-index: 9999;
      ">
        <div style="
          width: 50px;
          height: 50px;
          border: 3px solid #d946ef;
          border-top: 3px solid transparent;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 20px;
        "></div>
        <h2 style="margin: 0; font-weight: 300;">Loading Newomen...</h2>
        <p style="margin: 10px 0 0 0; opacity: 0.7; font-size: 14px;">Your AI growth companion</p>
      </div>
      
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
      
      <script>
        // Remove loading screen once React app loads
        setTimeout(() => {
          const loading = document.getElementById('initial-loading');
          if (loading && document.querySelector('[data-reactroot], [data-reactroot] *')) {
            loading.remove();
          }
        }, 100);
        
        // Fallback removal after 10 seconds
        setTimeout(() => {
          const loading = document.getElementById('initial-loading');
          if (loading) loading.remove();
        }, 10000);
      </script>
    </div>
    
    <script type="module" src="./src/main.tsx"></script>
    
    <!-- Fallback for JavaScript disabled -->
    <noscript>
      <div style="text-align:center;padding:50px;font-family:system-ui;">
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to use Newomen.</p>
      </div>
    </noscript>
  </body>
</html>
